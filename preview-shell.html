<body>

    src="https://5173-iwahllbt8px6pt65ffhec.e2b.app"
    title="PaletteSnap"
    allow="accelerometer; camera; encrypted-media; geolocation; gyroscope; microphone"
  ></iframe>
  <script>
    (function () {
      var slug = "palettesnap";
      var previewOrigin = "https://5173-iwahllbt8px6pt65ffhec.e2b.app";
      // Subdomain access (both {slug}.michii.dev and {slug}-preview.michii.dev,
      // where the worker proxies every path) maps app routes to the root
      // ("/lessons"); path-based access keeps the API prefix
      // ("/api/share/slug/lessons").
      var basePath =
        window.location.hostname.endsWith(".michii.dev") ? "" : "/api/share/" + slug;
      window.addEventListener("message", function (event) {
        if (!previewOrigin || event.origin !== previewOrigin) return;
        var data = event.data;
        if (!data || data.type !== "michii:route" || typeof data.path !== "string") return;
        // Accept origin-relative paths only ("/x" but never "//x")
        if (data.path.charAt(0) !== "/" || data.path.charAt(1) === "/") return;
        try {
          history.replaceState(null, "", basePath + data.path);
        } catch (e) {
          // Best-effort - the preview itself is unaffected
        }
      });
    })();
  </script>
